<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizator Tekstu | Parallel Pro</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .controls {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .control-item {
            flex: 1;
            min-width: 200px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        #statusArea {
            text-align: center;
            margin: 20px 0;
            font-weight: 600;
            color: var(--text-muted);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: #e2e8f0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-processing {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-done {
            background: #dcfce7;
            color: #166534;
        }

        .result-container {
            border-top: 2px solid var(--border-color);
            padding-top: 30px;
            display: none;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--bg-color);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card span {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-card strong {
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .letter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .letter-item {
            background: white;
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            transition: transform 0.2s;
        }

        .letter-item:hover {
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        .letter-item .char {
            font-size: 1.2rem;
            font-weight: 700;
            display: block;
        }

        .letter-item .count {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Spinner animation */
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0, 0, 0, .1);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Licznik Liter <small
                style="font-weight: 300; font-size: 0.5em; vertical-align: middle; background: #eee; padding: 2px 8px; border-radius: 4px;">Równoległy</small>
        </h1>

        <div class="input-group">
            <label for="textInput">Tekst do analizy</label>
            <textarea id="textInput" placeholder="Wklej tutaj tekst, który chcesz przeanalizować..."></textarea>
        </div>

        <div class="controls">
            <div class="control-item">
                <label for="workers">Liczba wątków (Web Workers)</label>
                <input type="number" id="workers" value="4" min="1" max="16">
            </div>
            <button onclick="startAnalysis()">
                <span>Analizuj tekst</span>
            </button>
        </div>

        <div id="statusArea"></div>

        <div id="results" class="result-container">
        </div>
    </div>

    <script>
        let currentTaskId = null;

        async function startAnalysis() {
            const content = document.getElementById('textInput').value;
            const workers = parseInt(document.getElementById('workers').value);
            const statusArea = document.getElementById('statusArea');
            const resultsDiv = document.getElementById('results');

            if (!content.trim()) {
                alert("Proszę wpisać tekst.");
                return;
            }

            resultsDiv.style.display = 'none';
            statusArea.innerHTML = '<span class="spinner"></span> Inicjowanie zadania...';

            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, workers })
                });

                const data = await response.json();
                currentTaskId = data.taskId;
                pollStatus();
            } catch (error) {
                statusArea.innerHTML = '<span style="color:red">Błąd połączenia z serwerem.</span>';
            }
        }

        async function pollStatus() {
            if (!currentTaskId) return;

            try {
                const response = await fetch('/api/tasks/' + currentTaskId);
                const task = await response.json();

                const statusArea = document.getElementById('statusArea');

                if (task.status === 'PROCESSING' || task.status === 'PENDING') {
                    statusArea.innerHTML = `<span class="status-badge status-processing"><span class="spinner"></span> Przetwarzanie...</span>`;
                    setTimeout(pollStatus, 500);
                } else if (task.status === 'DONE') {
                    statusArea.innerHTML = `<span class="status-badge status-done">Zakończono pomyślnie</span>`;
                    displayResults(task);
                } else {
                    statusArea.innerHTML = `<span style="color:red">Wystąpił błąd zadania.</span>`;
                }
            } catch (error) {
                console.error(error);
            }
        }

        function displayResults(task) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = 'block';

            const sortedLetters = Object.entries(task.result || {})
                .sort((a, b) => b[1] - a[1]);

            let gridHtml = '';
            sortedLetters.forEach(([char, count]) => {
                gridHtml += `
                    <div class="letter-item">
                        <span class="char">${char === ' ' ? 'Spacja' : char}</span>
                        <span class="count">${count}</span>
                    </div>
                `;
            });

            resultsDiv.innerHTML = `
                <div class="stats-summary">
                    <div class="stat-card">
                        <span>Czas operacji</span>
                        <strong>${task.durationMs} ms</strong>
                    </div>
                    <div class="stat-card">
                        <span>Unikalnych znaków</span>
                        <strong>${sortedLetters.length}</strong>
                    </div>
                </div>
                <h3 style="margin-bottom:15px; font-size:1.1rem">Rozkład znaków:</h3>
                <div class="letter-grid">
                    ${gridHtml}
                </div>
            `;
        }
    </script>
</body>

</html>
